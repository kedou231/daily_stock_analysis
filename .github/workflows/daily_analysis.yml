name: 每日股票分析

on:
  # 定时触发 - 每天北京时间 9:00, 10:30, 12:30, 14:30, 18:00
  schedule:
    - cron: '0 1 * * 1-5'      # 北京时间 9:00
    - cron: '30 2 * * 1-5'     # 北京时间 10:30
    - cron: '30 4 * * 1-5'     # 北京时间 12:30
    - cron: '30 6 * * 1-5'     # 北京时间 14:30
    - cron: '10 10 * * 1-5'    # 北京时间 18:00
  
  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # 完整分析（股票 + 大盘）
          - market_only   # 仅大盘复盘
          - stocks_only   # 仅股票分析
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

# 并发控制：同一时间只运行一个分析任务
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    # 添加超时限制，防止任务卡死
    timeout-minutes: 30
    
    steps:
      - name: 随机延迟（避免固定时间访问）
        run: sleep $((RANDOM % 60))  # 随机延迟 0-60 秒启动
      
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: |
          mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          # AI 配置
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          
          # AIHubMix
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}

          # OpenAI 兼容 API（阿里百炼）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL || 'qwen-plus' }}

          # 数据源
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          
          # 搜索服务
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          
          # 推送渠道 - 邮箱
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
          
          # 自选股
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          
          # 其他配置
          REPORT_TYPE: 'full'
          BIAS_THRESHOLD: '5.0'
          NEWS_MAX_AGE_DAYS: '3'
        
        run: |
          python main.py --mode "${{ github.event.inputs.mode || 'full' }}"
      
      - name: 上传报告（Artifact）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
